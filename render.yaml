services:
  - type: web
    name: aquatrack-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free

    # Persistent disk for JSON database and uploaded avatars
    disk:
      name: aquatrack-data
      mountPath: /opt/render/project/src/backend/db/data
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false                  # Set manually in Render dashboard → your Vercel URL
      - key: ADMIN_EMAIL
        sync: false                  # Set manually in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false                  # Set manually in Render dashboard
      - key: ADMIN_NAME
        value: Administrator
